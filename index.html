<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Dubber - Web Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background-color: #1e1e1e; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ប្រើប្រាស់ React Hook ដើម្បីគ្រប់គ្រងទិន្នន័យ
        const { useState, useRef } = React;

        function App() {
            // បង្កើត State សម្រាប់ផ្ទុកវីដេអូដែលបាន Upload
            const [videoUrl, setVideoUrl] = useState(null);
            const fileInputRef = useRef(null);

            const subtitles = [
                { id: 1, start: '0.00', end: '5.10', text: 'បងប្អូន មន្ត្រី ជាន់ ខ្ពស់ របស់ ប្រទេស កូរ៉េ ខាង ត្បូង...', voice: '👩🏻 KH Khmer' },
                { id: 2, start: '5.10', end: '9.58', text: 'ជុំវិញ រឿង រ៉ាវ ដែល លោក បាន បញ្ជា សារ ជា ភាសា ខ្មែរ...', voice: '👩🏻 KH Khmer' },
                { id: 3, start: '9.58', end: '12.44', text: 'ពាក់ព័ន្ធ នឹង រឿង ឧក្រិដ្ឋកម្ម ឆ្លង ដែន នៅ កម្ពុជា។', voice: '👨🏻 KH Khmer' }
            ];

            // មុខងារពេលចុចប៊ូតុង Load Video
            const handleLoadVideoClick = () => {
                fileInputRef.current.click();
            };

            // មុខងារពេលរើស File វីដេអូរួច
            const handleFileChange = (event) => {
                const file = event.target.files[0];
                if (file) {
                    // បង្កើត URL បណ្តោះអាសន្នដើម្បីចាក់វីដេអូក្នុង Browser
                    const url = URL.createObjectURL(file);
                    setVideoUrl(url);
                }
            };

            return (
                <div className="flex flex-col h-screen bg-[#1e1e1e] text-white text-sm outline-none">
                    {/* Header Bar */}
                    <div className="bg-[#0f3d30] text-green-400 text-center py-1 font-bold text-sm border-b border-green-600 flex justify-between px-4">
                        <span></span>
                        <span>🎬 AI Video Dubber - Ultimate Edition</span>
                        <span className="text-yellow-500">ស្មារតីខ្មែរ AI</span>
                    </div>

                    <div className="flex flex-1 p-1 gap-1 overflow-hidden">
                        
                        {/* ================= LEFT COLUMN ================= */}
                        <div className="w-[30%] flex flex-col gap-1">
                            
                            {/* Video Preview Area */}
                            <div className="border border-green-700 bg-black flex-1 flex flex-col relative overflow-hidden">
                                <div className="bg-[#0f3d30] text-green-400 px-2 py-1 text-xs font-bold border-b border-green-700 flex justify-between z-10">
                                    <span>📹 Video Preview</span>
                                </div>
                                
                                <div className="flex-1 flex items-center justify-center bg-[#111] relative">
                                    {videoUrl ? (
                                        /* ពេលមានវីដេអូ វានឹងបង្ហាញ Video Player */
                                        <video src={videoUrl} controls className="absolute inset-0 w-full h-full object-contain bg-black"></video>
                                    ) : (
                                        /* បើអត់មានវីដេអូ បង្ហាញរូបតំណាងធម្មតា */
                                        <div className="text-gray-600 text-center">
                                            <span className="text-4xl">▶️</span>
                                            <p className="mt-2 text-xs">No Video Loaded</p>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Tools Panel */}
                            <div className="border border-green-700 bg-[#222] h-[30%] flex flex-col">
                                <div className="bg-[#0f3d30] text-green-400 px-2 py-1 text-xs font-bold border-b border-green-700 flex justify-between items-center">
                                    <span>⚙ Tools</span>
                                </div>
                                <div className="grid grid-cols-2 gap-2 p-2 flex-1 content-start">
                                    {/* លាក់ Input ទុកសម្រាប់រើស File */}
                                    <input 
                                        type="file" 
                                        accept="video/*" 
                                        ref={fileInputRef} 
                                        onChange={handleFileChange} 
                                        style={{ display: 'none' }} 
                                    />
                                    {/* ភ្ជាប់មុខងារ handleLoadVideoClick ទៅប៊ូតុង */}
                                    <button onClick={handleLoadVideoClick} className="bg-[#d97706] hover:bg-yellow-600 text-white py-2 rounded text-xs font-bold cursor-pointer">
                                        📁 Load Video
                                    </button>
                                    <button className="bg-[#2563eb] hover:bg-blue-600 text-white py-2 rounded text-xs font-bold">🔄 Refresh</button>
                                    <button className="bg-[#7e22ce] hover:bg-purple-600 text-white py-2 rounded text-xs font-bold">📄 Import SRT</button>
                                    <button className="bg-[#475569] hover:bg-gray-600 text-white py-2 rounded text-xs font-bold">💾 Export SRT</button>
                                </div>
                            </div>
                        </div>

                        {/* ================= RIGHT COLUMN (រក្សាដូចដើម) ================= */}
                        <div className="w-[70%] flex flex-col gap-1">
                            <div className="border border-green-700 bg-[#1a1a1a] flex-1 flex flex-col overflow-hidden">
                                <div className="grid grid-cols-12 bg-orange-500 text-black font-bold text-xs">
                                    <div className="col-span-1 p-1 border-r border-orange-600">Start</div>
                                    <div className="col-span-1 p-1 border-r border-orange-600">End</div>
                                    <div className="col-span-6 p-1 border-r border-orange-600">Text ( Editable )</div>
                                    <div className="col-span-3 p-1 border-r border-orange-600 flex justify-between items-center">
                                        <span>Voice</span>
                                    </div>
                                    <div className="col-span-1 p-1 text-center">🔊 Audio</div>
                                </div>
                                <div className="overflow-y-auto flex-1">
                                    {subtitles.map((sub, index) => (
                                        <div key={index} className={`grid grid-cols-12 text-xs border-b border-[#333] ${index % 2 === 0 ? 'bg-[#1a2e24]' : 'bg-[#16271e]'} hover:bg-[#203a2d]`}>
                                            <div className="col-span-1 p-1 text-green-400 flex items-center border-r border-green-800">{sub.start}</div>
                                            <div className="col-span-1 p-1 text-red-400 flex items-center border-r border-green-800">{sub.end}</div>
                                            <div className="col-span-6 p-1 border-r border-green-800">
                                                <input type="text" className="w-full bg-transparent text-green-300 outline-none focus:bg-[#2a4a3a] px-1" defaultValue={sub.text} />
                                            </div>
                                            <div className="col-span-3 p-1 border-r border-green-800 flex items-center justify-between text-[11px]">
                                                <span className="text-gray-300 truncate w-20">{sub.voice}</span>
                                                <input type="range" className="w-16 h-1 bg-gray-600 rounded-lg appearance-none cursor-pointer" />
                                            </div>
                                            <div className="col-span-1 p-1 flex justify-center items-center">
                                                <button className="text-green-500 hover:text-white">🔊 Play</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="border border-green-700 bg-[#222] h-[30%] flex flex-col">
                                <div className="bg-[#0f3d30] text-green-400 px-2 py-1 text-xs font-bold border-b border-green-700 flex justify-between items-center">
                                    <span>〰 Timeline Editor</span>
                                    <button className="bg-green-500 text-black px-2 py-0.5 rounded text-[10px]">Auto Subs</button>
                                </div>
                                <div className="flex-1 relative bg-[#1a1a1a] overflow-hidden p-2">
                                    <div className="absolute top-2 left-2 right-2 h-8 bg-[#00ff7f] border border-black flex">
                                        <div className="w-[20%] border-r border-black p-1 text-[10px] text-black truncate">បងប្អូន មន្ត្រី ជាន់...</div>
                                        <div className="w-[30%] border-r border-black p-1 text-[10px] text-black truncate">ជុំវិញ រឿង ដែល ល...</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
